* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal:    #06AED5; --teal-l:   #E0F7FA; --teal-d:   #075E6B;
  --purple:  #FF6FA8; --purple-l: #FFE8F1; --purple-d: #99245C;
  --amber:   #FFC93C; --amber-l:  #FFF6DE; --amber-d:  #8A5A00;
  --coral:   #FF6B5B; --coral-l:  #FFEAE6; --coral-d:  #8C2A1E;
  --gray:    #8A8580; --gray-l:   #FBF6F0; --gray-d:   #2E2A28;
  --border:  rgba(46,42,40,0.10);
  --border-md: rgba(46,42,40,0.20);
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 20px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(160deg, #FFF4E6 0%, #FFE9E0 30%, #FFE3EE 55%, #E6F7FA 80%, #DFF3F8 100%);
  background-attachment: fixed;
  color: #2E2A28; font-size: 14px; min-height: 100vh;
}

#app { max-width: 960px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }

.hero {
  border-radius: var(--radius-xl);
  padding: 1.5rem 1.75rem;
  margin-bottom: 1.25rem;
  position: relative;
  overflow: hidden;
  background: linear-gradient(115deg, #FF6B5B 0%, #FF6FA8 28%, #FFC93C 55%, #06AED5 80%, #075E6B 100%);
  box-shadow: var(--shadow-md);
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 15% 30%, rgba(255,201,60,0.35) 0%, transparent 55%),
               radial-gradient(ellipse at 85% 15%, rgba(255,111,168,0.3) 0%, transparent 50%),
               radial-gradient(ellipse at 70% 95%, rgba(6,174,213,0.35) 0%, transparent 55%);
  pointer-events: none;
}
.hero-content { position: relative; z-index: 1; }
.hero-top { display: flex; align-items: flex-start; gap: 12px; }
.hero-title-input { font-size: 20px; font-weight: 600; width: 100%; border: none; background: transparent; color: #fff; padding: 2px 0; outline: none; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
.hero-title-input::placeholder { color: rgba(255,255,255,0.5); }
.hero-dest-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.hero-dest-input { font-size: 13px; width: 100%; border: none; background: transparent; color: rgba(255,255,255,0.75); padding: 2px 0; outline: none; }
.hero-dest-input::placeholder { color: rgba(255,255,255,0.4); }
.hero-meta { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.hero-badge { font-size: 12px; font-weight: 500; background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 12px; color: rgba(255,255,255,0.9); }
.sync-btn { display: flex; align-items: center; gap: 6px; flex-shrink: 0; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius-md); padding: 7px 12px; color: rgba(255,255,255,0.9); cursor: pointer; font-size: 12px; white-space: nowrap; backdrop-filter: blur(4px); font-family: inherit; transition: background 0.15s; }
.sync-btn:hover { background: rgba(255,255,255,0.25); }

.alert-bar { display: flex; align-items: center; margin-top: 10px; font-size: 13px; border-radius: var(--radius-md); padding: 9px 12px; gap: 8px; }
.alert-success { background: rgba(29,158,117,0.15); color: #d1fae5; border: 1px solid rgba(29,158,117,0.3); }
.alert-danger  { background: rgba(220,38,38,0.15);  color: #fecaca; border: 1px solid rgba(220,38,38,0.3); }

.tabs-wrap { background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 6px; margin-bottom: 1.25rem; display: flex; gap: 4px; overflow-x: auto; box-shadow: var(--shadow); }
.tab-btn { display: flex; align-items: center; gap: 7px; flex-shrink: 0; font-size: 13px; font-weight: 500; padding: 8px 14px; border: none; background: transparent; color: var(--gray); border-radius: var(--radius-md); cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
.tab-btn:hover { background: var(--gray-l); color: var(--gray-d); }
.tab-btn.active { color: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
.tab-btn[data-tab="overview"].active  { background: linear-gradient(135deg, var(--teal), #075E6B); }
.tab-btn[data-tab="itinerary"].active { background: linear-gradient(135deg, var(--purple), #99245C); }
.tab-btn[data-tab="rooms"].active     { background: linear-gradient(135deg, var(--amber), #8A5A00); }
.tab-btn[data-tab="expenses"].active  { background: linear-gradient(135deg, var(--coral), #8C2A1E); }

.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
.section-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; padding: 5px 14px; border-radius: 20px; color: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }

.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 14px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.card-teal::before   { background: linear-gradient(90deg, var(--teal), #5DCAA5, var(--purple)); }
.card-purple::before { background: linear-gradient(90deg, var(--purple), #AFA9EC, var(--amber)); }
.card-amber::before  { background: linear-gradient(90deg, var(--amber), #FAC775, var(--coral)); }
.card-coral::before  { background: linear-gradient(90deg, var(--coral), var(--amber), #FAC775); }
.card-day::before    { background: linear-gradient(90deg, var(--teal), var(--purple), var(--amber), var(--coral)); }

.card-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--gray-d); display: flex; align-items: center; gap: 8px; }
.card-title-dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-teal   { background: var(--teal); }
.dot-purple { background: var(--purple); }
.dot-amber  { background: var(--amber); }
.dot-coral  { background: var(--coral); }

table { width: 100%; font-size: 13px; border-collapse: collapse; }
th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray); padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; text-align: left; }
td { padding: 8px 10px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.total-row td { background: var(--gray-l); font-weight: 600; }
tr:not(.total-row):hover td { background: #fafafa; }

input, select, textarea { font-size: 13px; font-family: inherit; color: var(--gray-d); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 9px; background: #fff; width: 100%; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
input:focus, select:focus, textarea:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
.needs-fill { background: #fffbeb !important; border-color: #fcd34d !important; }
.field-label    { font-size: 12px; font-weight: 500; color: var(--gray); margin-bottom: 5px; }
.field-label-sm { font-size: 11px; color: #B4B2A9; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-coord { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end; }
@media (max-width: 580px) { .grid-2, .grid-3, .grid-coord { grid-template-columns: 1fr; } }

.badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; display: inline-block; }

.icon-btn { display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: #B4B2A9; padding: 5px; cursor: pointer; border-radius: var(--radius-sm); transition: all 0.15s; }
.icon-btn:hover { background: #fee2e2; color: #dc2626; }
.add-btn { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; border: 1.5px dashed var(--border-md); border-radius: var(--radius-md); padding: 9px 14px; background: transparent; color: var(--gray); margin-top: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; width: 100%; justify-content: center; }
.add-btn:hover { background: var(--gray-l); border-color: var(--teal); color: var(--teal); }

.day-index { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; background: linear-gradient(135deg, var(--teal), var(--purple)); box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
.night-index { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; background: linear-gradient(135deg, var(--amber), var(--coral)); box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
.warn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }

.totals-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: linear-gradient(135deg, var(--teal-l), var(--purple-l)); border-radius: var(--radius-md); border: 1px solid rgba(29,158,117,0.2); margin-bottom: 14px; }
.totals-bar-label { font-size: 14px; font-weight: 600; color: var(--teal-d); }
.totals-bar-value { font-size: 16px; font-weight: 700; color: var(--teal-d); }

.family-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 14px; box-shadow: var(--shadow); }
.family-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.family-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
.fav-1 { background: linear-gradient(135deg, var(--teal), #075E6B); }
.fav-2 { background: linear-gradient(135deg, var(--purple), #99245C); }
.fav-3 { background: linear-gradient(135deg, var(--amber), #8A5A00); }
.fav-4 { background: linear-gradient(135deg, var(--coral), #8C2A1E); }

.status-full    { background: #d1fae5; color: #065f46; }
.status-partial { background: #fef3c7; color: #92400e; }
.status-none    { background: #fee2e2; color: #991b1b; }

.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 0; }
.spinner { width: 36px; height: 36px; border: 3px solid transparent; border-top-color: var(--teal); border-right-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
tr.expense-row:hover td { background: #f0fdf4; }
</style>

  function deepMerge(base, inc) {
    if(!inc) return base;
    var m = JSON.parse(JSON.stringify(base));
    if(inc.info) m.info = Object.assign({},base.info,inc.info);
    if(m.info.destination && m.info.destination.indexOf("Đà Nẵng") >= 0) m.info.destination = "Qui Nhơn – Phú Yên – Ninh Vân";
    if(!m.info.numDays || m.info.numDays > 10) m.info.numDays = 5;
    ["families","members","itinerary","rooms","expenses","payments"].forEach(function(k){ if(inc[k]) m[k]=inc[k]; });
    if(typeof inc.otherCost!=="undefined") m.otherCost = inc.otherCost;
    m.payments = m.payments.map(function(p){ return {id:p.id||uid(), family:p.family, totalCost: (typeof p.totalCost!=="undefined")?p.totalCost:0, deposit:p.deposit||0, paid:p.paid||0}; });

    var NAME_MAP = {"Gia định 1":"Nhà Tú","Gia định 2":"Nhà Thi","Gia định 3":"OB Nội","Gia định 4":"Nhà Dung"};
    function fixName(n){ return NAME_MAP[n] || n; }
    m.families.forEach(function(f){ f.name = fixName(f.name); });
    m.members.forEach(function(mm){ mm.family = fixName(mm.family); });
    m.expenses.forEach(function(e){ e.family = fixName(e.family); });
    m.payments.forEach(function(p){ p.family = fixName(p.family); });
    m.rooms.forEach(function(r){
      ["ksA","ksB"].forEach(function(ks){
        if(r[ks]){
          if(r[ks].families) r[ks].families = r[ks].families.map(fixName);

      });
    });
    m.rooms = m.rooms.map(function(r,i){
      function up(k, defaultFams){

        if(k.rows && k.rows.length){
          return {
            hotel: k.hotel||"", address: k.address||"", phone: k.phone||"",

          };
        }
        var fams = (k.families && k.families.length) ? k.families : defaultFams;
        return {

          rows: fams.map(function(f){ return {id:uid(), family:f, roomType:k.roomType||"", numRooms:k.numRooms||1, pricePerNight:k.pricePerNight||0, deposit:k.deposit||0}; })

      return {id:r.id||uid(), nightIndex:r.nightIndex||i+1, date:r.date||"", ksA: up(r.ksA,["Nhà Tú","Nhà Thi"]), ksB: up(r.ksB,["OB Nội","Nhà Dung"]), note:r.note||""};

  function scheduleSave(next) {
    state.data = next; state.syncState = "saving"; render();
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      if(!state.fbReady) return;
      state.saving = true;
      window._fbSet(state.data).then(function(){ state.syncState="synced"; state.lastSynced=new Date(); state.error=null; })
      .catch(function(e){ state.syncState="error"; state.error="Lỗi lưu: "+e.message; })

  function updateRow(col,id,field,value){
    var n=clone(state.data),r=n[col].find(function(x){return x.id===id;});
    if(!r) return;
    if(field.indexOf(".")>=0){
      var parts=field.split(".");
      if(!r[parts[0]]) r[parts[0]]={};
      r[parts[0]][parts[1]]=value;
    } else { r[field]=value; }
    scheduleSave(n);
  }

  function fileToGenerativePart(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve({ inlineData: { data: reader.result.split(',')[1], mimeType: file.type } });
      reader.readAsDataURL(file);
    });
  }

  async function processExpenseWithAI() {
    const inputEl = document.getElementById("ai-input");
    const fileEl = document.getElementById("ai-file");
    const statusEl = document.getElementById("ai-status");
    const text = inputEl.value.trim();
    const file = fileEl.files[0];
    
    if (!text && !file) { statusEl.innerHTML = "❌ Hãy nhập câu lệnh hoặc đính một bức ảnh bill tính tiền."; return; }
    document.getElementById("ai-btn").disabled = true;
    statusEl.innerHTML = '<span class="spin" style="display:inline-block; margin-right:5px;">⏳</span> Gemini Pro 1.5 đang xử lý dữ liệu...';

    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${GEMINI_API_KEY}`;
    let parts = [];

    const prompt = `Bạn là kế toán chuyên nghiệp cho tour du lịch 4 gia đình: Nhà Tú, Nhà Thi, OB Nội, Nhà Dung.
    Danh mục chuẩn: "✈ Di chuyển", "🏨 Khách sạn", "🍜 Ăn uống", "🎡 Tham quan", "🛍 Mua sắm", "📦 Khác".
    Hãy đọc và bóc tách dữ liệu (văn bản hoặc hình ảnh bill chụp) thành DUY NHẤT một object JSON (không dùng ký tự backtick, không dùng định dạng code block):
    - "date": Định dạng YYYY-MM-DD (mặc định lấy "2026-07-22" nếu không có)
    - "category": Chọn đúng 1 danh mục chuẩn ở trên
    - "description": Mô tả ngắn gọn món chi tiêu
    - "family": Chọn 1 nhà trả tiền (Nhà Tú, Nhà Thi, OB Nội, Nhà Dung, hoặc "Tất cả")
    - "amount": Tổng số tiền (số nguyên, ví dụ: 2 triệu là 2000000)
    - "payer": Tên người chi tiền
    - "note": Ghi chú phát sinh nếu có`;

    parts.push({ text: prompt });
    if (text) parts.push({ text: `Yêu cầu từ người dùng: "${text}"` });
    if (file) { const imgData = await fileToGenerativePart(file); parts.push(imgData); }

    try {
      const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: parts }] }) });
      const result = await response.json();
      let cleanJson = result.candidates[0].content.parts[0].text.trim();
      
      if (cleanJson.startsWith("```")) { cleanJson = cleanJson.replace(/^```json|```$/g, "").trim(); }
      const parsed = JSON.parse(cleanJson);

      addRow("expenses", function() {
        return { id: uid(), date: parsed.date, category: parsed.category, description: parsed.description, family: parsed.family, amount: parsed.amount, payer: parsed.payer, note: parsed.note };
      });

      inputEl.value = ""; fileEl.value = "";
      statusEl.innerHTML = '<span style="color:#065f46; font-weight:600;">✅ AI đã phân tích và lưu lên Firebase thành công!</span>';
    } catch (e) {
      console.error(e);
      statusEl.innerHTML = '<span style="color:#991b1b;">❌ Lỗi: AI không bóc tách được dữ liệu. Vui lòng chụp rõ bill hoặc dùng giọng nói.</span>';
    } finally { document.getElementById("ai-btn").disabled = false; }
  }

  function startSpeechRecognition() {
    const micBtn = document.getElementById("mic-btn");
    const inputEl = document.getElementById("ai-input");
    const statusEl = document.getElementById("ai-status");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) { statusEl.innerHTML = "❌ Trình duyệt không hỗ trợ Mic. Hãy sử dụng Google Chrome hoặc Safari."; return; }

    const recognition = new SpeechRecognition();
    recognition.lang = "vi-VN";
    recognition.interimResults = false;

    recognition.onstart = () => {
      micBtn.style.background = "#fee2e2"; micBtn.style.color = "#dc2626"; micBtn.style.borderColor = "#dc2626"; micBtn.innerHTML = "🛑 Nghe...";
      statusEl.innerHTML = "🎙️ Đang mở Micro, bạn nói rõ ràng câu lệnh chi phí nhé...";
    };
    recognition.onerror = () => { statusEl.innerHTML = "❌ Lỗi ghi âm. Hãy kiểm tra lại quyền truy cập Mic của trình duyệt."; resetMic(); };
    recognition.onend = () => { resetMic(); };
    
    recognition.onresult = (e) => {
      const resultText = e.results[0][0].transcript;
      inputEl.value = resultText;
      statusEl.innerHTML = `✓ Điền chữ: "${resultText}". Nhấn ➕ **Cập nhật chi phí** bên cạnh để thêm nhanh.`;
      document.getElementById("quick-add-btn").style.display = "flex";
    };

    function resetMic() { micBtn.style.background = "#fff"; micBtn.style.color = "#7c3aed"; micBtn.style.borderColor = "#7c3aed"; micBtn.innerHTML = "🎙️ Nói"; }
    recognition.start();
  }

            id: uid(), 
            date: dateVal, 
            category: category, 
            description: cleanDesc, 
            family: family, 
            amount: amount, 
            payer: payer, 
            note: "Điền từ giọng nói" 
          };
        });

        document.getElementById("ai-input").value = "";
        document.getElementById("ai-status").innerHTML = "✅ Đã thêm và làm sạch dữ liệu!";
        quickAddBtn.style.display = "none";
        setTab("expenses");
      });
    }
  }

  render();
})();
</script>
